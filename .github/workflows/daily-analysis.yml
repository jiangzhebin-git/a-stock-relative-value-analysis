name: Daily stock relative-value analysis

on:
  schedule:
    # GitHub cron uses UTC: 07:35 UTC = 15:35 Asia/Shanghai.
    - cron: "35 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: eastmoney_relative_value
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      MPLBACKEND: Agg
      TZ: Asia/Shanghai

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: eastmoney_relative_value/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run four-stock analysis
        id: analysis
        run: python main.py --force

      - name: Send new signal alerts to Feishu
        run: python notify_feishu.py

      - name: Commit refreshed data and reports
        working-directory: .
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eastmoney_relative_value/data eastmoney_relative_value/output
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh daily stock analysis"
            git push
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-${{ github.run_number }}
          path: |
            eastmoney_relative_value/output/multi_stock_summary.csv
            eastmoney_relative_value/output/multi_stock_summary_report.md
            eastmoney_relative_value/output/alerts.csv
            eastmoney_relative_value/output/*/*_relative_value_report.md
          retention-days: 30

      - name: Send failure alert to Feishu
        if: failure() && env.FEISHU_WEBHOOK_URL != ''
        run: python notify_feishu.py --failure "GitHub Actions任务失败，运行编号：${{ github.run_number }}"

