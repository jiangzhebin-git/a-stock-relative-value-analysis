name: Refresh intraday dashboard

on:
  schedule:
    # A股交易时段，UTC对应北京时间；GitHub定时任务可能有数分钟延迟。
    - cron: "*/10 1-2 * * 1-5"
    - cron: "0-30/10 3 * * 1-5"
    - cron: "*/10 5-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: live-dashboard-pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: eastmoney_relative_value
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout model registry and dashboard
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: eastmoney_relative_value/requirements-live.txt

      - name: Install lightweight live dependencies
        run: python -m pip install -r requirements-live.txt

      - name: Refresh live snapshot
        run: python update_live.py

      - name: Build PIN configuration
        env:
          WEB_ACCESS_PIN: ${{ secrets.WEB_ACCESS_PIN }}
        run: python build_web_config.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: eastmoney_relative_value/web

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v5

